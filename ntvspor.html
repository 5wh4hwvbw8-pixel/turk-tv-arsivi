/* HEADER */
header{

padding:25px;
text-align:center;

padding:18px;
border-radius:12px;
margin-top:15px;

transition:0.3s;
}

.timeline:hover{
transform:scale(1.02);
background:#1b1b1b;
}

/* LOGO */
img{
width:180px;
background:white;
padding:10px;
border-radius:10px;
margin-top:10px;

}
