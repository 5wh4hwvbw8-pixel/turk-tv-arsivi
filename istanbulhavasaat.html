<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>İstanbul Canlı Saat & Hava</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0a0a0a,#1a1a1a);
color:white;
text-align:center;
}

/* HEADER */
header{
padding:20px;
background:#111;
box-shadow:0 4px 10px rgba(0,0,0,0.6);
}

h1{
margin:0;
color:#ff3b3b;
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:#161616;
padding:20px;
border-radius:15px;
margin-top:20px;
border:1px solid #333;
}

.big{
font-size:42px;
font-weight:bold;
color:#00d9ff;
margin:10px 0;
}

.clock{
font-size:38px;
font-weight:bold;
color:#00ff7b;
letter-spacing:2px;
}

.label{
opacity:0.7;
margin-top:5px;
}

/* BACK BUTTON */
a.back{
display:inline-block;
margin:15px auto;
padding:10px 15px;
background:#222;
color:white;
text-decoration:none;
border-radius:8px;
transition:0.3s;
}

a.back:hover{
background:#ff3b3b;
}

</style>
</head>

<body>

<header>
<h1>📍 İstanbul Canlı Panel</h1>
<p>Gerçek Saat & Hava Durumu</p>
</header>

<div class="container">

<!-- 🔙 ANA SAYFA -->
<a class="back" href="turk-tv-arsivi.html">⬅ Ana Sayfa</a>

<!-- 🌤️ HAVA -->
<div class="card">
<div class="label">🌤️ İstanbul Hava Durumu</div>
<div class="big" id="temp">Yükleniyor...</div>
<div class="label" id="desc"></div>
</div>

<!-- 🕒 SAAT -->
<div class="card">
<div class="label">🕒 Canlı Saat</div>
<div class="clock" id="clock">--:--:--</div>
<div class="label">Türkiye / İstanbul</div>
</div>

</div>

<script>

/* 🕒 SAAT */
function updateClock(){
let now = new Date();
let time = now.toLocaleTimeString("tr-TR", {
timeZone:"Europe/Istanbul"
});
document.getElementById("clock").innerText = time;
}
setInterval(updateClock,1000);
updateClock();

/* 🌤️ HAVA */
async function getWeather(){
try {
let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=41.01&longitude=28.97&current=temperature_2m,weather_code");

let data = await res.json();

let temp = data.current.temperature_2m;
let code = data.current.weather_code;

document.getElementById("temp").innerText = temp + "°C";

let desc = "Bilinmiyor";

if(code == 0) desc = "Açık hava ☀️";
else if(code <= 3) desc = "Parçalı bulutlu ⛅";
else if(code <= 48) desc = "Sisli 🌫️";
else if(code <= 67) desc = "Yağmurlu 🌧️";
else if(code <= 77) desc = "Karlı ❄️";
else desc = "Değişken hava";

document.getElementById("desc").innerText = desc;

} catch(e){
document.getElementById("temp").innerText = "Hava alınamadı";
}
}

getWeather();
setInterval(getWeather,600000);

</script>

</body>
</html>
