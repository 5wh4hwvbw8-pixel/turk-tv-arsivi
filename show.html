<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */
header{
background:linear-gradient(90deg,#b30000,#111);
padding:25px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.6);
}

header h1{
margin:0;
}

header p{
color:#ddd;
margin-top:5px;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* BACK BUTTON */
a.back{
display:inline-block;
margin-bottom:20px;
padding:10px 15px;
background:#222;
color:white;
text-decoration:none;
border-radius:8px;
transition:0.3s;
}

a.back:hover{
background:#ff3b3b;
color:white;
}

/* INFO */
.info{
background:#1c1c1c;
padding:15px;
border-radius:10px;
margin-bottom:20px;
border:1px solid #333;
line-height:1.6;
}

/* LOGO CARD */
.timeline{
background:#161616;
padding:18px;
border-radius:12px;
margin-top:15px;
border-left:5px solid #ff3b3b;
transition:0.3s;
}

.timeline:hover{
transform:scale(1.02);
background:#1b1b1b;
}

/* LOGO */
img{
width:180px;
background:white;
padding:10px;
border-radius:10px;
margin-top:10px;
display:block;
}

/* MOBILE */
@media (max-width:600px){
img{width:130px;}
}

</style>
</head>
