<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
background:url("https://www.tvreklami.com/assets/images/tv_kanallari.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

header{
background:linear-gradient(90deg,#b30000,#1a0000);
padding:25px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.6);
}

header h1{margin:0;}
header p{opacity:0.8;}

.section{
margin:20px;
padding-left:10px;
border-left:5px solid #ff3b3b;
font-size:20px;
color:#ff3b3b;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:18px;
padding:20px;
}

.card{
width:200px;
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
text-decoration:none;
color:white;
transition:0.3s;
border:1px solid #2a2a2a;
cursor:pointer;
}

.card:hover{
transform:scale(1.07);
box-shadow:0 10px 25px rgba(0,0,0,0.6);
border-color:#ff3b3b;
}

.card img{
width:100%;
height:130px;
object-fit:contain;
background:white;
}

.info{
padding:10px;
}

h3{
margin:0;
color:#ff3b3b;
font-size:16px;
}

p{
margin:5px 0 0;
font-size:12px;
opacity:0.8;
}

footer{
text-align:center;
padding:20px;
opacity:0.6;
margin-top:20px;
}
.home-btn{
position:absolute;
left:15px;
top:15px;
background:#222;
color:white;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
border:1px solid #ff3b3b;
transition:0.3s;
font-size:14px;
}

.home-btn:hover{
background:#ff3b3b;
transform:scale(1.05);
}

</style>

</head>
